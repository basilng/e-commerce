services:
  postgres:
    container_name: postgres_container
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_db
      PGDATA: /data/postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
      - postgres:/data/postgres
    networks:
      - postgres
    restart: unless-stopped

networks:
  postgres:
    driver: bridge

volumes:
  postgres:
  pg_data: